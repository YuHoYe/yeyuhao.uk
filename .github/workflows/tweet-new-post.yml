name: Tweet New Blog Post

on:
  push:
    branches: [master]
    paths:
      - 'src/content/blog/**'

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          NEW_POSTS=$(git diff HEAD~1 HEAD --name-only --diff-filter=A | grep '^src/content/blog/.*\.md$' || true)
          if [ -z "$NEW_POSTS" ]; then
            echo "No new blog posts found"
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "Found new posts: $NEW_POSTS"
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "$NEW_POSTS" > /tmp/new_posts.txt
          fi

      - name: Generate and post tweet
        if: steps.detect.outputs.has_new == 'true'
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          pip install tweepy pyyaml
          python3 << 'PYEOF'
          import os, re, yaml, tweepy

          with open('/tmp/new_posts.txt') as f:
              posts = f.read().strip().split('\n')

          client = tweepy.Client(
              consumer_key=os.environ['X_CONSUMER_KEY'],
              consumer_secret=os.environ['X_CONSUMER_SECRET'],
              access_token=os.environ['X_ACCESS_TOKEN'],
              access_token_secret=os.environ['X_ACCESS_TOKEN_SECRET']
          )

          for post_path in posts:
              with open(post_path) as f:
                  content = f.read()

              # Parse frontmatter
              match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  print(f'Skipping {post_path}: no frontmatter')
                  continue

              meta = yaml.safe_load(match.group(1))

              if meta.get('draft', False):
                  print(f'Skipping {post_path}: draft')
                  continue

              description = meta.get('description', meta.get('title', ''))
              slug = post_path.replace('src/content/blog/', '').replace('.md', '')
              url = f'https://yeyuhao.uk/blog/{slug}/'

              tweet = f'{description}\n\n{url}'

              # Trim to 280 chars if needed
              if len(tweet) > 280:
                  max_desc = 280 - len(url) - 4  # 2 newlines + buffer
                  tweet = f'{description[:max_desc]}...\n\n{url}'

              print(f'Posting tweet:\n{tweet}\n')
              response = client.create_tweet(text=tweet)
              print(f'Tweet posted: {response.data["id"]}')

          PYEOF
